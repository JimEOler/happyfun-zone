<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>happyfun.zone</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');

        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent1: #e94560;
            --accent2: #f5a623;
            --accent3: #0f3460;
            --text: #e8e8e8;
            --text-muted: #a0a0b8;
            --bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* ── Floating cartoon characters ── */
        .floaties {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .floaty {
            position: absolute;
            font-size: 2.5rem;
            animation: floatAround 18s var(--bounce) infinite;
            opacity: 0.25;
        }
        .floaty:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; font-size: 3rem; }
        .floaty:nth-child(2) { top: 70%; left: 88%; animation-delay: -3s; font-size: 2rem; }
        .floaty:nth-child(3) { top: 50%; left: 3%; animation-delay: -7s; font-size: 2.8rem; }
        .floaty:nth-child(4) { top: 20%; left: 85%; animation-delay: -11s; font-size: 2.2rem; }
        .floaty:nth-child(5) { top: 85%; left: 50%; animation-delay: -5s; font-size: 1.8rem; }
        .floaty:nth-child(6) { top: 35%; left: 50%; animation-delay: -15s; font-size: 2.6rem; }

        @keyframes floatAround {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(30px, -40px) rotate(12deg); }
            50% { transform: translate(-20px, 20px) rotate(-8deg); }
            75% { transform: translate(15px, -30px) rotate(5deg); }
        }

        /* ── Main content ── */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 720px;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ── Logo / Hero ── */
        .hero {
            margin-top: 3rem;
            text-align: center;
            animation: popIn 0.8s var(--bounce);
        }
        @keyframes popIn {
            0% { transform: scale(0.3); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .logo {
            font-family: 'Fredoka One', cursive;
            font-size: clamp(2.8rem, 10vw, 5rem);
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        .logo .bang { background: linear-gradient(135deg, var(--accent2), #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

        .tagline {
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: var(--text-muted);
            margin-top: 0.5rem;
            font-weight: 600;
        }

        /* ── Bouncing dots ── */
        .dots {
            display: flex;
            gap: 0.6rem;
            margin: 2.5rem 0;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            animation: bounce 1.2s var(--bounce) infinite;
        }
        .dot:nth-child(1) { background: var(--accent1); animation-delay: 0s; }
        .dot:nth-child(2) { background: var(--accent2); animation-delay: 0.15s; }
        .dot:nth-child(3) { background: #4ecdc4; animation-delay: 0.3s; }
        .dot:nth-child(4) { background: #a29bfe; animation-delay: 0.45s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-18px); }
        }

        /* ── Link cards ── */
        .links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-width: 420px;
            animation: fadeUp 0.8s var(--bounce) 0.3s both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: var(--card);
            border: 2px solid transparent;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text);
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.25s var(--bounce);
            position: relative;
            overflow: hidden;
        }
        .link-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent1), var(--accent2));
            opacity: 0;
            transition: opacity 0.3s;
            border-radius: 14px;
        }
        .link-card:hover::before { opacity: 0.1; }
        .link-card:hover {
            transform: translateY(-3px) scale(1.02);
            border-color: var(--accent2);
            box-shadow: 0 8px 30px rgba(233, 69, 96, 0.2);
        }
        .link-card:active { transform: scale(0.97); }

        .link-icon {
            font-size: 1.6rem;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .link-label {
            flex: 1;
            position: relative;
            z-index: 1;
        }
        .link-arrow {
            font-size: 1.2rem;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.25s var(--bounce);
            position: relative;
            z-index: 1;
        }
        .link-card:hover .link-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* ── Footer ── */
        .footer {
            margin-top: auto;
            padding: 2rem 0 1.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            animation: fadeUp 0.8s var(--bounce) 0.6s both;
        }
        .footer a {
            color: var(--accent2);
            text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .container { padding: 1.5rem 1rem; }
            .link-card { padding: 0.85rem 1rem; }
            .floaty { display: none; }
        }
    </style>
</head>
<body>
    <!-- Floating deco elements -->
    <div class="floaties">
        <div class="floaty">🎈</div>
        <div class="floaty">🌟</div>
        <div class="floaty">🎪</div>
        <div class="floaty">🎉</div>
        <div class="floaty">🦊</div>
        <div class="floaty">🌈</div>
    </div>

    <div class="container">
        <div class="hero">
            <div class="logo">happyfun<span class="bang">.</span>zone</div>
            <div class="tagline">✦ a little corner of the internet ✦</div>
        </div>

        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="links">
            <a href="https://github.com/JimEOler" class="link-card" target="_blank" rel="noopener">
                <span class="link-icon">🐙</span>
                <span class="link-label">GitHub</span>
                <span class="link-arrow">→</span>
            </a>

            <a href="https://discord.gg" class="link-card" target="_blank" rel="noopener">
                <span class="link-icon">💬</span>
                <span class="link-label">Discord</span>
                <span class="link-arrow">→</span>
            </a>

            <a href="https://bsky.app" class="link-card" target="_blank" rel="noopener">
                <span class="link-icon">🦋</span>
                <span class="link-label">Bluesky</span>
                <span class="link-arrow">→</span>
            </a>
        </div>

        <div class="footer">
            <p>built with ❤️ · <a href="https://github.com/JimEOler/happyfun-zone">source</a></p>
        </div>
    </div>
</body>
</html>
